<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- 背景 -->
  <rect width="128" height="128" rx="20" fill="#1976d2"/>
  
  <!-- 文档图标 -->
  <rect x="34" y="28" width="40" height="50" rx="4" fill="white"/>
  <line x1="42" y1="42" x2="66" y2="42" stroke="#1976d2" stroke-width="3" stroke-linecap="round"/>
  <line x1="42" y1="52" x2="66" y2="52" stroke="#1976d2" stroke-width="3" stroke-linecap="round"/>
  <line x1="42" y1="62" x2="58" y2="62" stroke="#1976d2" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 同步箭头 -->
  <circle cx="78" cy="78" r="22" fill="white" opacity="0.9"/>
